<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — ATS ScoreCard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#080c1e;color:#e2e8f0;font-family:'DM Sans',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 60% 50% at 30% 30%,rgba(59,130,246,0.08) 0%,transparent 60%);
      pointer-events:none}
    .card{background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:20px;
      padding:40px 36px;width:100%;max-width:420px;position:relative;z-index:1}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
    .logo-icon{width:44px;height:44px;background:#3b82f6;border-radius:12px;
      display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff}
    h1{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;color:#fff;
      text-align:center;margin-bottom:6px}
    .sub{color:#64748b;font-size:14px;text-align:center;margin-bottom:24px}
    .label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
      color:#64748b;margin-bottom:6px;display:block}
    .input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;
      font-family:'DM Sans',sans-serif;outline:none;transition:.2s;margin-bottom:14px}
    .input:focus{border-color:#3b82f6}
    .btn{width:100%;padding:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);
      border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;
      cursor:pointer;font-family:'DM Sans',sans-serif;transition:.2s}
    .btn:hover{opacity:.9}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{padding:12px 16px;border-radius:10px;font-size:14px;text-align:center;
      margin-top:14px;display:none}
    .msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7}
    .msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✓</div>
    <span class="logo-name">ATS ScoreCard</span>
  </div>
  <h1>Reset Password</h1>
  <p class="sub">Enter your new password below</p>

  <label class="label">New Password</label>
  <input class="input" type="password" id="newPassword" placeholder="Min 6 characters"/>

  <label class="label">Confirm Password</label>
  <input class="input" type="password" id="confirmPassword" placeholder="Re-enter password"/>

  <button class="btn" id="btn-reset">Set New Password</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://bdmpcthypkagzzifvbru.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbXBjdGh5cGthZ3p6aWZ2YnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTcwMTksImV4cCI6MjA4ODI5MzAxOX0.U_EvtGlHNyBAMpUogN6hZM2QHXUytJMURjhkvj2ifRk';

// Extract access token from URL hash
function getTokenFromHash() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  return {
    access_token: params.get('access_token'),
    refresh_token: params.get('refresh_token'),
    type: params.get('type')
  };
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

document.getElementById('btn-reset').addEventListener('click', async () => {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (!newPassword || newPassword.length < 6) {
    showMsg('Password must be at least 6 characters.', 'error'); return;
  }
  if (newPassword !== confirmPassword) {
    showMsg('Passwords do not match.', 'error'); return;
  }

  const { access_token, type } = getTokenFromHash();
  if (!access_token) {
    showMsg('Invalid or expired reset link. Please request a new one.', 'error'); return;
  }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Updating...';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${access_token}`
      },
      body: JSON.stringify({ password: newPassword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || 'Update failed');
    showMsg('✓ Password updated! You can now sign in to ATS ScoreCard.', 'success');
    btn.style.display = 'none';
  } catch(e) {
    showMsg(e.message || 'Failed to update password. Try requesting a new reset link.', 'error');
    btn.disabled = false;
    btn.innerHTML = 'Set New Password';
  }
});
</script>
</body>
</html>
